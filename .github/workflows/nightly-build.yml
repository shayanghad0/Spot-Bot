name: Nightly Build & Test

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2 AM
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  nightly:
    name: Nightly Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests matplotlib flake8 bandit codespell

      - name: Syntax check
        run: |
          echo "=== Python syntax check ==="
          find . -name "*.py" -not -path "./.git/*" | while read f; do
            python -m py_compile "$f" 2>&1 && echo "OK: $f" || echo "FAIL: $f"
          done

      - name: Security scan
        run: |
          echo "=== Bandit security scan ==="
          bandit -r . -f txt --skip B101 --exclude ./.git 2>&1 || true

      - name: Code metrics
        run: |
          echo "=== Code Statistics ==="
          echo ""
          echo "--- File count ---"
          find . -name "*.py" -not -path "./.git/*" | wc -l
          echo "Python files"
          echo ""
          echo "--- Total lines ---"
          find . -name "*.py" -not -path "./.git/*" -exec cat {} + | wc -l
          echo "total lines of Python"
          echo ""
          echo "--- Largest files ---"
          find . -name "*.py" -not -path "./.git/*" -exec wc -l {} + | sort -rn | head -10
          echo ""
          echo "--- README word count ---"
          if [ -f "readme.md" ]; then
            wc -w readme.md
          fi

      - name: Check for broken imports
        run: |
          echo "=== Checking imports ==="
          find . -name "*.py" -not -path "./.git/*" | while read f; do
            python -c "
          import ast, sys
          try:
              with open('$f') as fh:
                  tree = ast.parse(fh.read())
              imports = [n for n in ast.walk(tree) if isinstance(n, (ast.Import, ast.ImportFrom))]
              for imp in imports:
                  if isinstance(imp, ast.Import):
                      for alias in imp.names:
                          print(f'$f: import {alias.name}')
                  else:
                      print(f'$f: from {imp.module} import ...')
          except Exception as e:
              print(f'$f: ERROR - {e}')
          " 2>&1
          done | head -50

      - name: Nightly report
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "  NIGHTLY BUILD REPORT"
          echo "  Date: $(date)"
          echo "  Python: ${{ matrix.python-version }}"
          echo "============================================"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly build failed - Python ${{ matrix.python-version }}`,
              body: `## Nightly Build Failure\n\n**Date:** ${new Date().toISOString()}\n**Python:** ${{ matrix.python-version }}\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease check the workflow logs for details.`,
              labels: ['bug', 'ci-failure']
            });
