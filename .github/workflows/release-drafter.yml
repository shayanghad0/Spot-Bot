name: Release Drafter

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, reopened, synchronize, closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  draft-release:
    name: Draft Release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changelog entries
        id: changelog
        run: |
          # Get all log files and find the latest
          LOGS=$(ls -1 Change-log/*.log 2>/dev/null | sort -V || echo "")
          if [ -n "$LOGS" ]; then
            LATEST=$(echo "$LOGS" | tail -1)
            VERSION=$(basename "$LATEST" .log)
            CONTENT=$(cat "$LATEST")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "content<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CONTENT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(date +"%Y.%m.%d")
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "content<<EOF" >> "$GITHUB_OUTPUT"
            echo "No changelog entries found." >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Get recent commits
        id: commits
        run: |
          COMMITS=$(git log --oneline -20 --pretty=format:"- %s" 2>/dev/null || echo "")
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.changelog.outputs.version }}';
            const changelog = `${{ steps.changelog.outputs.content }}`;
            const commits = `${{ steps.commits.outputs.commits }}`;

            // Find existing draft release or create new one
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10
            });

            let draft = releases.data.find(r => r.draft && r.tag_name === `v${version}`);

            const body = `## What's Changed\n\n${commits}\n\n## Changelog\n\n${changelog}\n\n---\n*Auto-generated release*`;

            if (draft) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: draft.id,
                body: body
              });
              console.log(`Updated draft release v${version}`);
            } else {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: `v${version}`,
                name: `Release v${version}`,
                body: body,
                draft: true,
                prerelease: false
              });
              console.log(`Created draft release v${version}`);
            }
